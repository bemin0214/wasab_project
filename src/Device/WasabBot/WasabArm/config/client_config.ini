# ============================================================================
# Raspberry Pi robot client -> Laptop-local YOLO + pick-plan service
# ============================================================================
# The Raspberry Pi captures the image and reads the current robot Flange pose.
# The laptop runs YOLO and 2D->3D pick planning, then returns flange_command.
#
# Before running:
#   1) Start the laptop server: python run_server.py
#   2) Find the laptop's LAN IPv4 address.
#   3) Replace LAPTOP_LAN_IP below, for example:
#      grasp_server_url = http://192.168.0.20:8000/v1/grasp-plan
#
# Run on the Raspberry Pi:
#   cd raspberry_pi_laptop_client
#   python3 check_server_connection.py
#   python3 run_client.py
# ============================================================================

[network]
; Use the laptop LAN IP, never 127.0.0.1. The laptop server listens on port 8000.
grasp_server_url = http://192.168.0.11:8000/v1/grasp-plan
; The paired laptop service returns this value from GET /health.
expected_server_runtime = laptop-local
; Keep false during deployment: loopback means "this Raspberry Pi", not the laptop.
allow_loopback_server = false
connect_timeout_sec = 3.0
health_timeout_sec = 5.0
check_server_on_startup = true
; CPU inference can be slower on the laptop. Increase only when an actual request needs longer.
request_timeout_sec = 45.0
jpeg_quality = 90

[camera_stream]
; Upload the latest robot camera frame to the laptop server so it can be viewed at:
;   http://<LAPTOP_LAN_IP>:8000/camera-view
; This does not run YOLO. It only sends a lightweight preview image.
enabled = true
fps = 4.0
timeout_sec = 0.8
jpeg_quality = 45


[udp_stream]
; WaSaBArm Streamer -> WaSaBWebService camera preview transport.
; Leave host empty to reuse the host from [network] grasp_server_url.
enabled = true
host = 
port = 8001
; Keep below common MTU to reduce packet fragmentation on Wi-Fi.
max_datagram_bytes = 1400
; If UDP send fails locally, fall back to HTTP /camera-frame upload.
fallback_http = true

[remote_control]
; Browser button commands are delivered by a persistent server-push stream. No polling is used.
enabled = true
timeout_sec = 0.4

[camera]
camera_id = 0
; Must exactly match the laptop server calibration settings.
; The supplied laptop project uses 640 x 480.
frame_width = 640
frame_height = 480
; Discard buffered frames when pick is requested so the plan uses a recent image.
flush_frames_before_capture = 2

[robot]
mycobot_port = /dev/ttyJETCOBOT
mycobot_baud = 1000000
; send_coords speed and mode
move_speed = 35
move_mode = 0
; Target-reached tolerances
pose_position_tol_mm = 3.0
pose_angle_tol_deg = 3.0
move_timeout_sec = 20.0
move_poll_sec = 0.05
; Base-frame home Flange pose: x, y, z, rx, ry, rz
home_flange_coords = 147.2, 52.7, 242.2, -177.51, 5.1, -94.2

[gripper]
; Typical electric gripper: 0=closed, 100=open. Adjust only for the physical device.
open_value = 100
close_value = 0
speed = 70
settle_sec = 0.4

[safety]
; Keep true for the first end-to-end laptop-local test.
; With true, no robot or gripper command is sent after a plan is received.
dry_run = false
; Pi-side final workspace gate for server flange_command [mm].
safe_x_min_mm = -260.0
safe_x_max_mm = 260.0
safe_y_min_mm = -260.0
safe_y_max_mm = 260.0
safe_z_min_mm = -50.0
safe_z_max_mm = 350.0
; Absolute limit for rx, ry, rz [deg].
safe_euler_abs_deg = 360.0

[random_motion]
; R command: move to a conservative random flange pose around home.
enabled = true
x_radius_mm = 35.0
y_radius_mm = 35.0
z_radius_mm = 20.0

[manual_motion]
; M command: move to this configured Base-frame Flange pose after local safety validation.
enabled = true
target_flange_coords = 144.1, -62.3, 241.4, -177.85, 5.43, -137.08

[place_motion]
; F command: move HOME first, then move to this Base-frame Flange pose and open the gripper.
; Placeholder is currently HOME_FLANGE_COORDS. Adjust this later for the real drop-off position.
enabled = true
target_flange_coords = 147.2, 52.7, 242.2, -177.51, 5.1, -94.2

[conducting]
; Conducting reference poses. Motion starts at start_flange_coords.
; distance_scale controls how far the arm moves from HOME toward each reference pose.
; Start at 0.5, then increase gradually: 0.6, 0.8, 1.0.
enabled = true
; joint_rhythm uses small joint-angle servo updates like tracking.
; flange restores the old send_coords interpolation behavior.
control_mode = joint_rhythm
distance_scale = 0.5
cycles = 10
move_speed = 35
rate_hz = 12.0
beat_sec = 0.50
return_sec = 0.8
servo_gain = 0.45
yaw_amplitude_deg = 10.0
pitch_amplitude_deg = 9.0
wrist_amplitude_deg = 4.0
; Old flange interpolation settings, used only when control_mode = flange.
continuous = true
interpolation_steps = 8
command_interval_sec = 0.18
start_flange_coords = 57.0, -64.2, 410.7, -89.76, 42.8, -89.57
down_flange_coords = 21.0, -67.2, 424.2, -56.88, 39.32, -70.69
up_flange_coords = 58.4, -66.7, 409.3, -92.03, 42.7, -94.01
left_flange_coords = -7.5, -113.2, 409.6, -90.38, 58.09, -177.43
right_flange_coords = -0.8, -58.3, 412.9, -73.65, 60.99, -67.19

[marker_search]
; Find Marker command: scan the camera by sweeping one joint until an April marker is visible.
enabled = true
; OpenCV ArUco dictionary name. AprilTag dictionaries are supported when OpenCV provides them.
dictionary = DICT_APRILTAG_36h11
; Empty means accept any marker id. Example: target_ids = 0, 1
target_ids =
pan_joint = 1
pan_range_deg = 50.0
search_step_deg = 3.0
speed = 25
hz = 8.0
; 0 means keep scanning until a marker is found or the process is stopped.
max_duration_sec = 0.0

[ui]
show_window = false
window_name = Laptop-local pick/place client | pick | place | pose | gripper | random | servo-release | servo-focus | move | home | exit
